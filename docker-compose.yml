version: '3.8'

services:
  seaweed-master:
    image: chrislusf/seaweedfs
    command: master
    ports:
      - "9333:9333"
    networks:
      - papeis-network
    volumes:
      - seaweedfs_master:/data # ← persiste os metadados

  postgres-keycloak:
    image: postgres:16-alpine
    container_name: postgres-keycloak
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5433:5432"
    networks:
      - papeis-network
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql/data
  seaweed-volume:
    image: chrislusf/seaweedfs
    command: volume -mserver=seaweed-master:9333 -publicUrl=localhost:8081
    depends_on:
      - seaweed-master
    ports:
      - "8081:8080"
    networks:
      - papeis-network
    volumes:
      - seaweedfs_volume:/data # ← persiste os arquivos

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8180
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_STRICT_HTTPS: 'false'
    ports:
      - "8180:8080"
    depends_on:
      - postgres-keycloak
    networks:
      - papeis-network
    command:
      - start-dev

  postgres-papeis:
    image: postgres:16-alpine
    container_name: postgres-papeis
    environment:
      POSTGRES_DB: topicos1db
      POSTGRES_USER: topicos1
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    networks:
      - papeis-network
    volumes:
      - postgres-papeis-data:/var/lib/postgresql/data

networks:
  papeis-network:
    driver: bridge

volumes:
  postgres-keycloak-data:
  postgres-papeis-data:
  seaweedfs_master:
  seaweedfs_volume:

